target-version = "py312"
line-length = 120

[lint]
select = ["E", "F", "W", "I"]

# Ignore rules that conflict with existing code patterns
ignore = [
    "E501",   # line too long — handled by formatter
    "F401",   # unused imports — some are intentional re-exports
]

[lint.per-file-ignores]
"main.py" = ["E402"]              # routers imported after app creation
"streamlit_app.py" = ["E402"]     # dotenv loaded before imports
"models/pipeline.py" = ["E402"]   # TypedDict section after Pydantic models
"alembic/versions/*.py" = ["W291", "I001"]  # auto-generated migration files

[lint.isort]
known-first-party = ["api", "core", "db", "graph", "models", "workers", "tests"]
