target-version = "py312"
line-length = 120
src = [".", "app"]

[lint]
select = ["E", "F", "W", "I"]

# Ignore rules that conflict with existing code patterns
ignore = [
    "E501",   # line too long — handled by formatter
    "F401",   # unused imports — some are intentional re-exports
]

[lint.per-file-ignores]
"app/main.py" = ["E402"]              # routers imported after app creation
"app/models/pipeline.py" = ["E402"]   # TypedDict section after Pydantic models
"alembic/versions/*.py" = ["W291", "I001"]  # auto-generated migration files

[lint.isort]
known-first-party = ["app", "tests"]
