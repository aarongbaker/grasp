[pytest]
markers =
    integration: marks tests that require external API keys (deselect with '-m "not integration"')
asyncio_mode = auto
pythonpath = .
addopts = --ignore=tests/test_admin_invites.py --ignore=tests/test_invite_gating.py --ignore=tests/test_ingestion_tasks.py --ignore=tests/test_state_machine.py --ignore=tests/test_api_routes.py --ignore=tests/test_deploy_readiness.py
