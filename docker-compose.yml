services:
  # ── API app (port 8000) ──────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://grasp:grasp@postgres:5432/grasp
      LANGGRAPH_CHECKPOINT_URL: postgresql://grasp:grasp@postgres:5432/grasp
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      PORT: 8000
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Celery worker ────────────────────────────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://grasp:grasp@postgres:5432/grasp
      LANGGRAPH_CHECKPOINT_URL: postgresql://grasp:grasp@postgres:5432/grasp
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      CELERY_WORKER_CONCURRENCY: 1
    command: celery -A workers.celery_app worker --pool=solo --concurrency=1 --loglevel=INFO
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Dev Postgres (port 5432) ─────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: grasp
      POSTGRES_PASSWORD: grasp
      POSTGRES_DB: grasp
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U grasp"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Test Postgres (port 5433) ─────────────────────────────────────────────────
  # Isolated test DB — Phase 3 requirement. Never shares state with dev DB.
  postgres-test:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: grasp
      POSTGRES_PASSWORD: grasp
      POSTGRES_DB: grasp_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U grasp"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Redis ─────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
