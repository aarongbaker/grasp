version: "3.9"

services:
  # ── Dev Postgres (port 5432) ─────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: grasp
      POSTGRES_PASSWORD: grasp
      POSTGRES_DB: grasp
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U grasp"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Test Postgres (port 5433) ─────────────────────────────────────────────────
  # Isolated test DB — Phase 3 requirement. Never shares state with dev DB.
  postgres-test:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: grasp
      POSTGRES_PASSWORD: grasp
      POSTGRES_DB: grasp_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U grasp"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Redis ─────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
